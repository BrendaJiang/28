<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>资产编号识别</title>
  <!-- 飞书 SDK：原生 ESM，加载完毕后派发 bitable-ready 事件 -->
  <script type="module">
    import { bitable } from './assets/sdk/index.mjs';
    window.bitable = bitable;
    window.dispatchEvent(new Event('bitable-ready'));
  </script>
  <!-- Tesseract.js：同步加载，挂载全局 Tesseract 对象 -->
  <script src="./assets/tesseract.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
      font-size: 13px;
      background: #f0f2f5;
      color: #1f2329;
      min-height: 100vh;
      padding: 12px;
    }

    .card {
      background: #fff;
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 10px;
      box-shadow: 0 1px 2px rgba(0,0,0,.08);
    }

    /* 标题 */
    .header { display: flex; align-items: center; gap: 10px; }
    .header-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: linear-gradient(135deg, #1456f0, #4b86ff);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .header-icon svg { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .header-text h1 { font-size: 15px; font-weight: 600; line-height: 1.3; }
    .header-text p  { font-size: 12px; color: #8f959e; margin-top: 1px; }

    /* 配置 */
    .config-label {
      font-size: 11px; color: #8f959e; font-weight: 500;
      text-transform: uppercase; letter-spacing: .4px; margin-bottom: 8px;
    }
    .field-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
    .field-row:last-child { margin-bottom: 0; }
    .field-tag {
      flex-shrink: 0; font-size: 11px; padding: 3px 8px;
      border-radius: 4px; font-weight: 500; white-space: nowrap;
    }
    .tag-photo  { background: #e8f3ff; color: #1456f0; }
    .tag-result { background: #e8f8f1; color: #1b8c51; }
    .field-input {
      flex: 1; border: 1px solid #dde0e5; border-radius: 6px;
      padding: 5px 10px; font-size: 13px; color: #1f2329;
      outline: none; transition: border-color .15s; background: #fff;
    }
    .field-input:focus    { border-color: #1456f0; }
    .field-input:disabled { background: #f5f6fa; color: #8f959e; cursor: not-allowed; }

    /* 状态 */
    .status-row {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 10px 12px; border-radius: 6px; font-size: 13px;
    }
    .status-row.init    { background: #f5f6fa; color: #646a73; }
    .status-row.loading { background: #e8f3ff; color: #1456f0; }
    .status-row.success { background: #e8f8f1; color: #1b8c51; }
    .status-row.warning { background: #fff7e6; color: #b36b00; }
    .status-row.error   { background: #fff1f0; color: #d93026; }
    .status-icon { flex-shrink: 0; width: 16px; height: 16px; margin-top: 1px; }
    .spinner {
      border: 2px solid currentColor; border-top-color: transparent;
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 进度 */
    .progress-wrap { margin-top: 10px; }
    .progress-track { background: #f0f2f5; border-radius: 4px; height: 5px; overflow: hidden; }
    .progress-fill  { height: 100%; background: #1456f0; border-radius: 4px; transition: width .25s ease; width: 0%; }
    .progress-meta  { display: flex; justify-content: space-between; font-size: 11px; color: #8f959e; margin-top: 5px; }

    /* 统计 */
    .stats { display: flex; gap: 8px; margin-top: 10px; }
    .stat-item  { flex: 1; text-align: center; padding: 8px 4px; background: #f5f6fa; border-radius: 6px; }
    .stat-num   { font-size: 22px; font-weight: 700; line-height: 1.1; display: block; }
    .stat-ok   .stat-num { color: #1b8c51; }
    .stat-skip .stat-num { color: #8f959e; }
    .stat-fail .stat-num { color: #d93026; }
    .stat-label { font-size: 11px; color: #8f959e; margin-top: 2px; display: block; }

    /* 按钮 */
    .btn {
      width: 100%; padding: 8px; border-radius: 6px; border: none; cursor: pointer;
      font-size: 13px; font-weight: 500; margin-top: 10px; transition: opacity .15s;
    }
    .btn:hover  { opacity: .85; }
    .btn:active { opacity: .7;  }
    .btn-primary { background: #1456f0; color: #fff; }
    .btn-ghost   { background: #f0f2f5; color: #1f2329; }

    /* 日志 */
    .log-header { font-size: 11px; color: #8f959e; font-weight: 500; margin-bottom: 8px; }
    .log-scroll { max-height: 240px; overflow-y: auto; }
    .log-item   {
      display: flex; align-items: flex-start; gap: 6px;
      padding: 5px 0; border-bottom: 1px solid #f0f2f5; font-size: 12px;
    }
    .log-item:last-child { border-bottom: none; }
    .log-badge {
      flex-shrink: 0; padding: 1px 6px; border-radius: 10px;
      font-size: 11px; font-weight: 500; margin-top: 1px;
    }
    .log-badge.ok   { background: #e8f8f1; color: #1b8c51; }
    .log-badge.skip { background: #f5f6fa; color: #8f959e; }
    .log-badge.fail { background: #fff1f0; color: #d93026; }
    .log-text { flex: 1; color: #1f2329; line-height: 1.5; word-break: break-all; }

    /* 提示 */
    .tip { font-size: 11px; color: #8f959e; padding: 8px 10px; background: #f5f6fa; border-radius: 6px; line-height: 1.6; }
  </style>
</head>
<body>

<!-- 标题 -->
<div class="card">
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18"/></svg>
    </div>
    <div class="header-text">
      <h1>资产编号识别</h1>
      <p>自动识别标签照片中的资产编号并回写</p>
    </div>
  </div>
</div>

<!-- 字段配置 -->
<div class="card" id="config-card">
  <div class="config-label">字段名称配置</div>
  <div class="field-row">
    <span class="field-tag tag-photo">图片列</span>
    <input class="field-input" id="photo-field" type="text" value="请上传资产标签照片" placeholder="图片/附件列名称">
  </div>
  <div class="field-row">
    <span class="field-tag tag-result">结果列</span>
    <input class="field-input" id="result-field" type="text" value="资产编号识别" placeholder="写入结果的文本列名称">
  </div>
</div>

<!-- 状态 & 进度 -->
<div class="card" id="status-card">
  <div class="status-row init" id="status-row">
    <div class="status-icon" id="status-icon"></div>
    <span id="status-text">准备就绪，等待初始化…</span>
  </div>

  <div id="progress-wrap" class="progress-wrap" style="display:none">
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="progress-meta">
      <span id="progress-label">0 / 0</span>
      <span id="progress-pct">0%</span>
    </div>
  </div>

  <div class="stats" id="stats" style="display:none">
    <div class="stat-item stat-ok">
      <span class="stat-num" id="cnt-ok">0</span>
      <span class="stat-label">已识别</span>
    </div>
    <div class="stat-item stat-skip">
      <span class="stat-num" id="cnt-skip">0</span>
      <span class="stat-label">已跳过</span>
    </div>
    <div class="stat-item stat-fail">
      <span class="stat-num" id="cnt-fail">0</span>
      <span class="stat-label">识别失败</span>
    </div>
  </div>

  <button class="btn btn-primary" id="restart-btn" style="display:none" onclick="restart()">重新扫描全表</button>
</div>

<!-- 识别日志 -->
<div class="card" id="log-card" style="display:none">
  <div class="log-header">识别日志（最新在前）</div>
  <div class="log-scroll" id="log-scroll"></div>
</div>

<!-- 提示 -->
<div class="tip" id="tip" style="display:none">
  提示：插件仅处理当前视图内可见的记录。如需处理全部数据，请切换到无筛选的视图后重新扫描。
</div>

<script>
'use strict';

/* ── 全局状态 ── */
const state = {
  running: false,
  stats: { ok: 0, skip: 0, fail: 0 },
  worker: null,
};

/* ── UI 辅助 ── */
function setStatus(type, text) {
  const row  = document.getElementById('status-row');
  const icon = document.getElementById('status-icon');
  const txt  = document.getElementById('status-text');
  row.className = `status-row ${type}`;
  txt.textContent = text;
  icon.className  = 'status-icon';
  icon.innerHTML  = '';
  if (type === 'loading') {
    icon.innerHTML = '<div class="spinner" style="width:14px;height:14px"></div>';
  } else if (type === 'success') {
    icon.innerHTML = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 8l3.5 3.5L13 4.5"/></svg>';
  } else if (type === 'error') {
    icon.innerHTML = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 3v5m0 3v1"/></svg>';
  } else if (type === 'warning') {
    icon.innerHTML = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 3v5m0 3v1"/></svg>';
  }
}

function showProgress(done, total) {
  document.getElementById('progress-wrap').style.display = 'block';
  document.getElementById('stats').style.display = 'flex';
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width  = pct + '%';
  document.getElementById('progress-label').textContent = `${done} / ${total}`;
  document.getElementById('progress-pct').textContent   = pct + '%';
  document.getElementById('cnt-ok').textContent   = state.stats.ok;
  document.getElementById('cnt-skip').textContent = state.stats.skip;
  document.getElementById('cnt-fail').textContent = state.stats.fail;
}

function addLog(type, text) {
  const card   = document.getElementById('log-card');
  const scroll = document.getElementById('log-scroll');
  card.style.display = 'block';
  const item = document.createElement('div');
  item.className = 'log-item';
  const labels = { ok: '识别', skip: '跳过', fail: '失败' };
  item.innerHTML = `<span class="log-badge ${type}">${labels[type]}</span><span class="log-text">${text}</span>`;
  scroll.insertBefore(item, scroll.firstChild);
}

function lockConfig(locked) {
  document.getElementById('photo-field').disabled  = locked;
  document.getElementById('result-field').disabled = locked;
}

/* ── 方向校正 + 缩放：EXIF 旋正并缩至最长边 ≤ 1800px ── */
function correctOrientation(src) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      try {
        let w = img.naturalWidth;
        let h = img.naturalHeight;
        // 强制缩小，防止大图导致 canvas 内存溢出
        const MAX = 2400;
        const longest = Math.max(w, h);
        if (longest > MAX) {
          const s = MAX / longest;
          w = Math.round(w * s);
          h = Math.round(h * s);
        }
        const canvas = document.createElement('canvas');
        canvas.width  = w;
        canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        // 检测画布是否真的有内容（非全黑/全白空白）
        const sample = canvas.getContext('2d').getImageData(w >> 1, h >> 1, 1, 1).data;
        // 若中心像素是纯黑则可能空白，但先不回退，交给 Tesseract 判断
        const dataUrl = canvas.toDataURL('image/png');  // PNG 无损，Tesseract 解码更可靠
        resolve(dataUrl);
      } catch (e) {
        console.warn('[orient] canvas失败:', e.message);
        resolve(src);
      }
    };
    img.onerror = () => resolve(src);
    img.src = src;
  });
}

/* ── 图像旋转（处理标签竖贴/侧贴的情况）── */
function rotateImage(src, degrees) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      try {
        const rad = degrees * Math.PI / 180;
        const sin = Math.abs(Math.sin(rad)), cos = Math.abs(Math.cos(rad));
        const w = img.naturalWidth, h = img.naturalHeight;
        const rw = Math.round(w * cos + h * sin);
        const rh = Math.round(w * sin + h * cos);
        const canvas = document.createElement('canvas');
        canvas.width = rw; canvas.height = rh;
        const ctx = canvas.getContext('2d');
        ctx.translate(rw / 2, rh / 2);
        ctx.rotate(rad);
        ctx.drawImage(img, -w / 2, -h / 2);
        resolve(canvas.toDataURL('image/png'));
      } catch (e) { resolve(src); }
    };
    img.onerror = () => resolve(src);
    img.src = src;
  });
}

/* ── 图像预处理：灰度 + 对比度拉伸 + 2× 放大 ── */
function enhanceContrast(src) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      try {
        // 2× 放大有助于识别细小字体（模拟 300dpi）
        const scale = 2;
        const MAX = 4800;
        let w = img.naturalWidth * scale, h = img.naturalHeight * scale;
        if (Math.max(w, h) > MAX) { const s = MAX / Math.max(w, h); w = Math.round(w * s); h = Math.round(h * s); }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(img, 0, 0, w, h);
        const imageData = ctx.getImageData(0, 0, w, h);
        const d = imageData.data;
        // 灰度化
        for (let i = 0; i < d.length; i += 4) {
          const g = Math.round(0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2]);
          d[i] = d[i + 1] = d[i + 2] = g;
        }
        // 百分位对比度拉伸（p5–p95，避免噪点拉爆）
        const hist = new Array(256).fill(0);
        for (let i = 0; i < d.length; i += 4) hist[d[i]]++;
        const total = d.length / 4;
        let cum = 0, lo = 0, hi = 255;
        for (let v = 0; v < 256; v++) {
          cum += hist[v];
          if (cum / total < 0.05) lo = v;
          if (cum / total < 0.95) hi = v;
        }
        const range = hi - lo || 1;
        for (let i = 0; i < d.length; i += 4) {
          const v = Math.min(255, Math.max(0, Math.round(((d[i] - lo) / range) * 255)));
          d[i] = d[i + 1] = d[i + 2] = v;
        }
        ctx.putImageData(imageData, 0, 0);
        resolve(canvas.toDataURL('image/png'));
      } catch (e) { resolve(src); }
    };
    img.onerror = () => resolve(src);
    img.src = src;
  });
}

/* ── 图像预处理：fetch → blob URL → canvas Otsu 二值化 ── */
async function preprocessImage(imageUrl) {
  // 用 fetch 拿 blob，blob URL 不受 CORS 限制，canvas 不会被污染
  let blobUrl = null;
  try {
    const resp = await fetch(imageUrl);
    if (resp.ok) {
      blobUrl = URL.createObjectURL(await resp.blob());
    }
  } catch (_) {}

  const src = blobUrl || imageUrl;   // fetch 失败则直接用原始 URL

  return new Promise((resolve) => {
    const img = new Image();
    if (!blobUrl) img.crossOrigin = 'anonymous';   // 非 blob 时仍尝试 CORS

    img.onload = () => {
      try {
        const MAX = 2400, MIN = 600;
        let { naturalWidth: w, naturalHeight: h } = img;
        const scale = w < MIN ? MIN / w : w > MAX ? MAX / w : 1;
        w = Math.round(w * scale);
        h = Math.round(h * scale);

        const canvas = document.createElement('canvas');
        canvas.width  = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);

        // 灰度化
        const imgData = ctx.getImageData(0, 0, w, h);
        const data = imgData.data;
        const gray = new Uint8Array(w * h);
        for (let i = 0; i < w * h; i++) {
          gray[i] = Math.round(0.299 * data[i * 4] + 0.587 * data[i * 4 + 1] + 0.114 * data[i * 4 + 2]);
        }

        // Otsu 阈值
        const hist = new Array(256).fill(0);
        for (const v of gray) hist[v]++;
        const total = w * h;
        let sum = 0;
        for (let t = 0; t < 256; t++) sum += t * hist[t];
        let sumB = 0, wB = 0, max = 0, threshold = 128;
        for (let t = 0; t < 256; t++) {
          wB += hist[t];
          if (wB === 0) continue;
          const wF = total - wB;
          if (wF === 0) break;
          sumB += t * hist[t];
          const mB = sumB / wB;
          const mF = (sum - sumB) / wF;
          const between = wB * wF * (mB - mF) ** 2;
          if (between > max) { max = between; threshold = t; }
        }

        // 二值化写回
        for (let i = 0; i < w * h; i++) {
          const v = gray[i] > threshold ? 255 : 0;
          data[i * 4] = data[i * 4 + 1] = data[i * 4 + 2] = v;
          data[i * 4 + 3] = 255;
        }
        ctx.putImageData(imgData, 0, 0);
        if (blobUrl) URL.revokeObjectURL(blobUrl);
        resolve(canvas.toDataURL('image/png'));
      } catch (e) {
        if (blobUrl) URL.revokeObjectURL(blobUrl);
        resolve(imageUrl);   // canvas 失败则兜底原始 URL
      }
    };

    img.onerror = () => {
      if (blobUrl) URL.revokeObjectURL(blobUrl);
      resolve(imageUrl);
    };
    img.src = src;
  });
}

/* ── 正则提取资产编号 ── */
function extractAssetNumber(rawText) {
  // 合并跨行断开的数字（OCR 换行截断：1-0102-00\n779 → 1-0102-00779）
  const text = rawText.replace(/([0-9])\n([0-9])/g, '$1$2').replace(/\s+/g, ' ').trim();
  // 规则 1：字母+数字前缀，后接两组纯数字（BIO403-1044-0070）
  const r1 = /[A-Z]{1,6}[0-9]{0,6}-[0-9]{2,8}-[0-9]{2,8}/gi;
  // 规则 2：纯数字分段（01-0101-00004），限制首段最多2位避免多余前导数字
  const r2 = /\b[0-9]{1,2}-[0-9]{2,6}-[0-9]{2,8}\b/g;
  // 规则 3：宽松匹配（任意字母数字，两个连字符）
  const r3 = /\b[A-Z0-9]{2,12}-[A-Z0-9]{2,8}-[A-Z0-9]{2,8}\b/gi;
  for (const pattern of [r1, r2, r3]) {
    const matches = text.match(pattern);
    if (matches && matches.length > 0) {
      // 取最短匹配（去除 OCR 噪点拼接的多余前缀）
      let result = matches.sort((a, b) => a.length - b.length)[0].toUpperCase();
      // 补全首段单数字为两位（OCR 常丢前导零：1-0101-00004 → 01-0101-00004）
      result = result.replace(/^([0-9])-/, '0$1-');
      // 修正镜像读反（纯数字段：88500-1010-10 → 01-0101-00588）
      if (/^\d+-\d+-\d+$/.test(result)) {
        const parts = result.split('-');
        if (parts[0].length > parts[parts.length - 1].length) {
          const rev = result.split('').reverse().join('');
          if (/^\d{1,2}-\d{2,6}-\d{2,8}$/.test(rev)) result = rev;
        }
      }
      return result;
    }
  }
  return null;
}

/* ── 判断单元格是否有值 ── */
function hasValue(cellVal) {
  if (!cellVal) return false;
  if (typeof cellVal === 'string') return cellVal.trim() !== '';
  if (Array.isArray(cellVal)) {
    if (cellVal.length === 0) return false;
    if (cellVal[0] && (cellVal[0].token || cellVal[0].fileToken)) return true;
    return cellVal.some(seg => seg.text && seg.text.trim() !== '');
  }
  return false;
}

/* ── 获取附件临时 URL ── */
async function getFirstAttachmentUrl(table, fieldId, recordId, cellVal) {
  if (!hasValue(cellVal)) return null;
  const attachments = Array.isArray(cellVal) ? cellVal : [];
  if (attachments.length === 0) return null;
  const token = attachments[0].token || attachments[0].fileToken;
  if (!token) return null;
  // SDK 签名：getCellAttachmentUrls(tokens: string[], fieldId, recordId)
  const urls = await table.getCellAttachmentUrls([token], fieldId, recordId);
  if (!urls || urls.length === 0) return null;
  return urls[0];
}

/* ── 主流程 ── */
async function run() {
  if (state.running) return;
  state.running = true;
  state.stats = { ok: 0, skip: 0, fail: 0 };

  document.getElementById('restart-btn').style.display   = 'none';
  document.getElementById('log-card').style.display      = 'none';
  document.getElementById('log-scroll').innerHTML        = '';
  document.getElementById('tip').style.display           = 'none';
  document.getElementById('progress-wrap').style.display = 'none';
  document.getElementById('stats').style.display         = 'none';
  lockConfig(true);

  try {
    /* 1. 检查环境 */
    const inIframe = window !== window.top;
    if (window.bitable == null) {
      setStatus('error', inIframe
        ? 'bitable SDK 尚未就绪，请关闭插件后重新打开'
        : '请在飞书多维表格插件面板中打开此页面');
      return;
    }

    /* 2. 连接多维表格（15 秒超时） */
    setStatus('loading', '连接多维表格…');
    const table = await Promise.race([
      bitable.base.getActiveTable(),
      new Promise((_, reject) =>
        setTimeout(() => reject(new Error('连接飞书宿主超时（15 秒），请关闭插件后重新打开')), 15000)
      ),
    ]);

    /* 3. 查找字段 */
    const photoFieldName  = document.getElementById('photo-field').value.trim();
    const resultFieldName = document.getElementById('result-field').value.trim();
    if (!photoFieldName || !resultFieldName) {
      setStatus('error', '请填写图片列和结果列的字段名称');
      return;
    }

    const fieldList = await table.getFieldMetaList();
    const photoField  = fieldList.find(f => f.name === photoFieldName);
    const resultField = fieldList.find(f => f.name === resultFieldName);
    if (!photoField)  { setStatus('error', `未找到字段「${photoFieldName}」，请检查字段名称`);  return; }
    if (!resultField) { setStatus('error', `未找到字段「${resultFieldName}」，请检查字段名称`); return; }

    /* 4. 获取当前视图可见记录 */
    setStatus('loading', '读取记录列表…');
    const view      = await table.getActiveView();
    const recordIds = await view.getVisibleRecordIdList();
    const total     = recordIds.length;
    if (total === 0) { setStatus('warning', '当前视图没有可见记录'); return; }

    /* 5. 初始化 Tesseract Worker */
    setStatus('loading', '加载 OCR 引擎…');
    const assets  = new URL('./assets/', document.baseURI).href;
    const siteRoot = new URL('./', document.baseURI).href;  // traineddata 放在根目录
    state.worker = await Tesseract.createWorker('chi_sim+eng', 3, {
      logger:     () => {},
      workerPath: assets + 'worker.min.js',
      corePath:   assets,
      langPath:   siteRoot,   // chi_sim.traineddata.gz 和 eng.traineddata.gz 均在根目录
    });
    await state.worker.setParameters({
      tessedit_pageseg_mode: '11',  // 稀疏文字模式
      // 不设 char_whitelist：LSTM 引擎加白名单反而降低置信度导致空输出
    });

    /* 6. 逐行处理 */
    setStatus('loading', `开始识别，共 ${total} 条记录…`);
    showProgress(0, total);

    for (let i = 0; i < total; i++) {
      const recordId = recordIds[i];
      try {
        const photoVal  = await table.getCellValue(photoField.id, recordId);
        const resultVal = await table.getCellValue(resultField.id, recordId);

        // 两列都有值 → 跳过
        if (hasValue(photoVal) && hasValue(resultVal)) {
          state.stats.skip++;
          addLog('skip', `第 ${i + 1} 行 — 已有识别结果，跳过`);
          showProgress(i + 1, total);
          continue;
        }

        // 无图片 → 跳过
        if (!hasValue(photoVal)) {
          state.stats.skip++;
          addLog('skip', `第 ${i + 1} 行 — 无图片，跳过`);
          showProgress(i + 1, total);
          continue;
        }

        // OCR
        let recognized = null;
        let rawOcrText = '';
        let debugInfo  = '';
        try {
          const attachUrl = await getFirstAttachmentUrl(table, photoField.id, recordId, photoVal);
          if (!attachUrl) {
            debugInfo = '附件URL获取失败（SDK未返回URL）';
          } else {
            // 下载图片为 blob，避免 CORS 问题
            let blobUrl = null;
            try {
              const resp = await fetch(attachUrl);
              if (resp.ok) blobUrl = URL.createObjectURL(await resp.blob());
            } catch (_) {}
            const src = blobUrl || attachUrl;

            const tryRecognize = async (image, psmList) => {
              for (const psm of psmList) {
                await state.worker.setParameters({ tessedit_pageseg_mode: psm });
                const { data: { text } } = await state.worker.recognize(image);
                debugInfo = `PSM${psm} 长度=${text.length}`;
                rawOcrText = text;
                const r = extractAssetNumber(text);
                if (r) return r;
              }
              return null;
            };

            // 策略 0：系统级 TextDetector（Chrome/Android ML Kit / Windows OCR / macOS Vision）
            // 对真实照片比 Tesseract 准确得多；不支持时静默跳过
            if ('TextDetector' in window) {
              try {
                const detector = new TextDetector();
                const blobResp = await fetch(src);
                const imgBlob = await blobResp.blob();
                const bitmap = await createImageBitmap(imgBlob);
                const detected = await detector.detect(bitmap);
                bitmap.close();
                if (detected && detected.length > 0) {
                  rawOcrText = detected.map(t => t.rawValue).join('\n');
                  debugInfo = `系统OCR ${detected.length}块`;
                  recognized = extractAssetNumber(rawOcrText);
                } else {
                  debugInfo = '系统OCR 未检测到文字';
                }
              } catch (sysErr) {
                console.warn('[TextDetector]', sysErr.message);
              }
            }

            // 策略 1：EXIF 方向校正（浏览器 drawImage 自动旋正）→ LSTM 识别
            const oriented = await correctOrientation(src);
            const canvasOk = typeof oriented === 'string' && oriented.startsWith('data:');
            debugInfo = canvasOk ? `canvas:${oriented.length}` : 'canvas失败用blobURL';
            recognized = await tryRecognize(oriented, ['11', '6', '3', '7']);

            // 策略 2：旋转 90° 顺时针（标签竖贴、2×36 窄条错误根因）
            if (!recognized) {
              debugInfo = '旋转90°CW…';
              const rot90 = await rotateImage(src, 90);
              if (rot90 !== src) recognized = await tryRecognize(rot90, ['11', '6', '3', '7']);
            }

            // 策略 3：旋转 90° 逆时针
            if (!recognized) {
              debugInfo = '旋转90°CCW…';
              const rot270 = await rotateImage(src, 270);
              if (rot270 !== src) recognized = await tryRecognize(rot270, ['11', '6', '3', '7']);
            }

            // 策略 4：2×3 分块 + 3× 放大（标签在大图中占比小时有效）
            if (!recognized) {
              debugInfo = '分块识别…';
              recognized = await new Promise((resolveTile) => {
                const img2 = new Image();
                img2.onload = async () => {
                  const W = img2.naturalWidth, H = img2.naturalHeight;
                  const COLS = 2, ROWS = 3, SCALE = 3;
                  const stepX = Math.round(W / COLS), stepY = Math.round(H / ROWS);
                  let found = null;
                  for (let row = 0; row < ROWS && !found; row++) {
                    for (let col = 0; col < COLS && !found; col++) {
                      const x = Math.max(0, col * stepX - Math.round(stepX * 0.15));
                      const y = Math.max(0, row * stepY - Math.round(stepY * 0.15));
                      const w = Math.min(W - x, Math.round(stepX * 1.3));
                      const h = Math.min(H - y, Math.round(stepY * 1.3));
                      const cv = document.createElement('canvas');
                      cv.width  = Math.min(w * SCALE, 3600);
                      cv.height = Math.min(h * SCALE, 3600);
                      const cx2 = cv.getContext('2d');
                      cx2.imageSmoothingEnabled = true;
                      cx2.imageSmoothingQuality = 'high';
                      cx2.drawImage(img2, x, y, w, h, 0, 0, cv.width, cv.height);
                      found = await tryRecognize(cv.toDataURL('image/png'), ['11', '6', '3']);
                    }
                  }
                  resolveTile(found);
                };
                img2.onerror = () => resolveTile(null);
                img2.src = src;
              });
            }

            // 策略 5：灰度 + 对比度拉伸 + 2× 放大（低对比度标签）
            if (!recognized) {
              debugInfo = '对比度增强…';
              const enhanced = await enhanceContrast(src);
              if (enhanced !== src) {
                recognized = await tryRecognize(enhanced, ['11', '6', '3', '7']);
              }
            }

            // 策略 6：Otsu 二值化兜底
            if (!recognized) {
              debugInfo = '改用Otsu预处理…';
              const processed = await preprocessImage(src);
              if (processed !== src) {
                recognized = await tryRecognize(processed, ['11', '6', '7']);
              }
            }

            if (blobUrl) URL.revokeObjectURL(blobUrl);
            await state.worker.setParameters({ tessedit_pageseg_mode: '11' }); // 还原
          }
        } catch (ocrErr) {
          console.error('OCR 出错', ocrErr);
          debugInfo = `异常: ${ocrErr.message || ocrErr}`;
        }

        // 回写
        if (recognized) {
          await table.setCellValue(resultField.id, recordId, [{ type: 'text', text: recognized }]);
          state.stats.ok++;
          addLog('ok', `第 ${i + 1} 行 → ${recognized}`);
          console.log(`[调试] 第${i+1}行成功，OCR原文:`, rawOcrText.trim().substring(0, 200));
        } else {
          state.stats.fail++;
          const preview = rawOcrText.trim().substring(0, 100).replace(/\n/g, '↵');
          const msg = preview
            ? `第 ${i + 1} 行 [${debugInfo}] OCR文本: "${preview}"`
            : `第 ${i + 1} 行 — ${debugInfo}`;
          addLog('fail', msg);
          console.log(`[调试] 第${i+1}行完整OCR文本:`, rawOcrText);
        }
      } catch (rowErr) {
        console.error('处理记录出错', recordId, rowErr);
        state.stats.fail++;
        addLog('fail', `第 ${i + 1} 行 — 处理出错：${rowErr.message || rowErr}`);
      }

      showProgress(i + 1, total);
    }

    /* 7. 完成 */
    showProgress(total, total);
    const msg = `全部处理完毕 — 识别 ${state.stats.ok} 条，跳过 ${state.stats.skip} 条，失败 ${state.stats.fail} 条`;
    setStatus(state.stats.fail > 0 ? 'warning' : 'success', msg);
    document.getElementById('restart-btn').style.display = 'block';
    document.getElementById('tip').style.display         = 'block';

  } catch (err) {
    console.error('主流程出错', err);
    setStatus('error', `运行出错：${err.message || err}`);
  } finally {
    state.running = false;
    lockConfig(false);
  }
}

/* ── 重新扫描 ── */
async function restart() {
  if (state.worker) {
    try { await state.worker.terminate(); } catch (_) {}
    state.worker = null;
  }
  run();
}

/* ── 自动启动
   ESM 模块脚本与 DOMContentLoaded 的触发顺序在不同 WebView 中不固定，
   采用双向等待：bitable 已就绪则立即启动，否则等待 bitable-ready 事件。
── */
function startWhenReady() {
  if (window.bitable != null) {
    run();
  } else {
    window.addEventListener('bitable-ready', run, { once: true });
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', startWhenReady);
} else {
  startWhenReady();
}
</script>
</body>
</html>
