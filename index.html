<!DOCTYPE html>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;

    /* 标题 */

      width: 32px; height: 32px; border-radius: 8px;
      background: linear-gradient(135deg, #1456f0, #4b86ff);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;

    .header-icon svg { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .header-text h1 { font-size: 15px; font-weight: 600; line-height: 1.3; }
    .header-text p  { font-size: 12px; color: #8f959e; margin-top: 1px; }

    /* 配置 */

      font-size: 11px; color: #8f959e; font-weight: 500;
      text-transform: uppercase; letter-spacing: .4px; margin-bottom: 8px;
    }
    .field-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
    .field-row:last-child { margin-bottom: 0; }
    .field-tag {
      flex-shrink: 0; font-size: 11px; padding: 3px 8px;
      border-radius: 4px; font-weight: 500; white-space: nowrap;
    }
    .tag-photo  { background: #e8f3ff; color: #1456f0; }
    .tag-result { background: #e8f8f1; color: #1b8c51; }
    .field-input {
      flex: 1; border: 1px solid #dde0e5; border-radius: 6px;
      padding: 5px 10px; font-size: 13px; color: #1f2329;

    .field-input:disabled { background: #f5f6fa; color: #8f959e; cursor: not-allowed; }

      display: flex; align-items: flex-start; gap: 8px;
      padding: 10px 12px; border-radius: 6px; font-size: 13px;
    }
    .status-row.init    { background: #f5f6fa; color: #646a73; }
    .status-row.loading { background: #e8f3ff; color: #1456f0; }
    .status-row.success { background: #e8f8f1; color: #1b8c51; }
    .status-row.warning { background: #fff7e6; color: #b36b00; }
    .status-row.error   { background: #fff1f0; color: #d93026; }
    .status-icon { flex-shrink: 0; width: 16px; height: 16px; margin-top: 1px; }
    .spinner {
      border: 2px solid currentColor; border-top-color: transparent;
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 进度 */
    .progress-wrap { margin-top: 10px; }
    .progress-track { background: #f0f2f5; border-radius: 4px; height: 5px; overflow: hidden; }
    .progress-fill  { height: 100%; background: #1456f0; border-radius: 4px; transition: width .25s ease; width: 0%; }
    .progress-meta  { display: flex; justify-content: space-between; font-size: 11px; color: #8f959e; margin-top: 5px; }

    /* 统计 */
    .stats { display: flex; gap: 8px; margin-top: 10px; }
    .stat-item  { flex: 1; text-align: center; padding: 8px 4px; background: #f5f6fa; border-radius: 6px; }

    .stat-skip .stat-num { color: #8f959e; }
    .stat-fail .stat-num { color: #d93026; }
    .stat-label { font-size: 11px; color: #8f959e; margin-top: 2px; display: block; }

    /* 按钮 */
    .btn {
      width: 100%; padding: 8px; border-radius: 6px; border: none; cursor: pointer;
      font-size: 13px; font-weight: 500; margin-top: 10px; transition: opacity .15s;
    }
    .btn:hover  { opacity: .85; }
    .btn:active { opacity: .7;  }
    .btn-primary { background: #1456f0; color: #fff; }

    .log-badge.fail { background: #fff1f0; color: #d93026; }
    .log-text { flex: 1; color: #1f2329; line-height: 1.5; word-break: break-all; }

    /* 提示 */
    .tip { font-size: 11px; color: #8f959e; padding: 8px 10px; background: #f5f6fa; border-radius: 6px; line-height: 1.6; }

<script>
'use strict';

/* ── 全局状态 ── */
const state = {
  running: false,
  stats: { ok: 0, skip: 0, fail: 0 },
};

/* ── UI 辅助 ── */
function setStatus(type, text) {
  const row  = document.getElementById('status-row');
  const icon = document.getElementById('status-icon');
  const txt  = document.getElementById('status-text');
  row.className = `status-row ${type}`;
  txt.textContent = text;
  icon.className  = 'status-icon';
  icon.innerHTML  = '';
  if (type === 'loading') {
    icon.innerHTML = '<div class="spinner" style="width:14px;height:14px"></div>';
  } else if (type === 'success') {
    icon.innerHTML = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 8l3.5 3.5L13 4.5"/></svg>';
  } else if (type === 'error') {
    icon.innerHTML = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 3v5m0 3v1"/></svg>';
  } else if (type === 'warning') {
    icon.innerHTML = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 3v5m0 3v1"/></svg>';
  }
}

function showProgress(done, total) {
  document.getElementById('progress-wrap').style.display = 'block';
  document.getElementById('stats').style.display = 'flex';
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width  = pct + '%';
  document.getElementById('progress-label').textContent = `${done} / ${total}`;
  document.getElementById('progress-pct').textContent   = pct + '%';
  document.getElementById('cnt-ok').textContent   = state.stats.ok;
  document.getElementById('cnt-skip').textContent = state.stats.skip;
  document.getElementById('cnt-fail').textContent = state.stats.fail;
}

function addLog(type, text) {
  const card   = document.getElementById('log-card');
  const scroll = document.getElementById('log-scroll');
  card.style.display = 'block';
  const item = document.createElement('div');
  item.className = 'log-item';
  const labels = { ok: '识别', skip: '跳过', fail: '失败' };
  item.innerHTML = `<span class="log-badge ${type}">${labels[type]}</span><span class="log-text">${text}</span>`;
  scroll.insertBefore(item, scroll.firstChild);
}

function lockConfig(locked) {
  document.getElementById('photo-field').disabled  = locked;
  document.getElementById('result-field').disabled = locked;
}

/* ── jsQR 解码：多角度 + 多阈值，提升对复杂光线的识别率 ── */
function decodeQR(src) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      try {
        let w = img.naturalWidth, h = img.naturalHeight;
        const MAX = 2400;
        const longest = Math.max(w, h);
        if (longest > MAX) { const s = MAX / longest; w = Math.round(w * s); h = Math.round(h * s); }

        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);

        // 旋转整张 canvas
        function rotated(src, deg, sw, sh) {
          const cv = document.createElement('canvas');
          if (deg === 0) {
            cv.width = sw; cv.height = sh;
            cv.getContext('2d').drawImage(src, 0, 0);
          } else {
            const rad = deg * Math.PI / 180;
            const cw = deg === 180 ? sw : sh;
            const ch = deg === 180 ? sh : sw;
            cv.width = cw; cv.height = ch;
            const cx = cv.getContext('2d');
            cx.translate(cw / 2, ch / 2);
            cx.rotate(rad);
            cx.drawImage(src, -sw / 2, -sh / 2);
          }
          return cv;
        }

        // 全局灰度二值化
        function thresholded(src, t) {
          const cv = document.createElement('canvas');
          cv.width = src.width; cv.height = src.height;
          const ctx = cv.getContext('2d');
          ctx.drawImage(src, 0, 0);
          const id = ctx.getImageData(0, 0, cv.width, cv.height);
          const d = id.data;
          for (let i = 0; i < d.length; i += 4) {
            const g = 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2];
            const v = g > t ? 255 : 0;
            d[i] = d[i + 1] = d[i + 2] = v; d[i + 3] = 255;
          }
          ctx.putImageData(id, 0, 0);
          return cv;
        }

        // 自适应局部阈值（块大小 blockSize，偏移 C）—— 处理不均匀光照
        function adaptiveThreshold(src, blockSize, C) {
          const cv = document.createElement('canvas');
          cv.width = src.width; cv.height = src.height;
          const ctx = cv.getContext('2d');
          ctx.drawImage(src, 0, 0);
          const id = ctx.getImageData(0, 0, cv.width, cv.height);
          const d = id.data;
          const W = cv.width, H = cv.height;
          const half = Math.floor(blockSize / 2);
          // 灰度化
          const gray = new Float32Array(W * H);
          for (let i = 0; i < W * H; i++) {
            const j = i * 4;
            gray[i] = 0.299 * d[j] + 0.587 * d[j + 1] + 0.114 * d[j + 2];
          }
          // 积分图加速局部均值
          const intg = new Float64Array((W + 1) * (H + 1));
          for (let y = 1; y <= H; y++) {
            for (let x = 1; x <= W; x++) {
              intg[y * (W + 1) + x] = gray[(y - 1) * W + (x - 1)]
                + intg[(y - 1) * (W + 1) + x]
                + intg[y * (W + 1) + (x - 1)]
                - intg[(y - 1) * (W + 1) + (x - 1)];
            }
          }
          for (let y = 0; y < H; y++) {
            for (let x = 0; x < W; x++) {
              const x1 = Math.max(0, x - half), y1 = Math.max(0, y - half);
              const x2 = Math.min(W - 1, x + half), y2 = Math.min(H - 1, y + half);
              const cnt = (x2 - x1 + 1) * (y2 - y1 + 1);
              const sum = intg[(y2 + 1) * (W + 1) + (x2 + 1)]
                - intg[y1 * (W + 1) + (x2 + 1)]
                - intg[(y2 + 1) * (W + 1) + x1]
                + intg[y1 * (W + 1) + x1];
              const mean = sum / cnt;
              const v = gray[y * W + x] < mean - C ? 0 : 255;
              const j = (y * W + x) * 4;
              d[j] = d[j + 1] = d[j + 2] = v; d[j + 3] = 255;
            }
          }
          ctx.putImageData(id, 0, 0);
          return cv;
        }

        // 从 canvas 中裁切区域，放大到 targetSize
        function cropAndZoom(src, sx, sy, sw, sh, targetSize) {
          const cv = document.createElement('canvas');
          cv.width = targetSize; cv.height = targetSize;
          cv.getContext('2d').drawImage(src, sx, sy, sw, sh, 0, 0, targetSize, targetSize);
          return cv;
        }

        function tryDecode(cv) {
          const id = cv.getContext('2d').getImageData(0, 0, cv.width, cv.height);
          const code = jsQR(id.data, id.width, id.height, { inversionAttempts: 'attemptBoth' });
          return (code && code.data) ? code.data.trim() : null;
        }

        // 对某个 canvas 尝试：原图 + 全局阈值 + 自适应阈值，各 4 方向
        function tryAllOnCanvas(cv) {
          const cw = cv.width, ch = cv.height;
          const angles = [0, 90, 180, 270];
          // 原图 4 方向
          for (const deg of angles) {
            const r = tryDecode(rotated(cv, deg, cw, ch));
            if (r) return r;
          }
          // 全局二值化 × 5档
          for (const t of [80, 110, 140, 160, 180]) {
            const tv = thresholded(cv, t);
            for (const deg of angles) {
              const r = tryDecode(rotated(tv, deg, tv.width, tv.height));
              if (r) return r;
            }
          }
          // 自适应阈值（两种参数）
          for (const [bs, c] of [[31, 10], [51, 15]]) {
            const av = adaptiveThreshold(cv, bs, c);
            for (const deg of angles) {
              const r = tryDecode(rotated(av, deg, av.width, av.height));
              if (r) return r;
            }
          }
          return null;
        }

        // Pass 1：整张图
        const r1 = tryAllOnCanvas(canvas);
        if (r1) { resolve(r1); return; }

        // Pass 2：9 个裁切区域（3×3 网格 + 4 个半区）放大到 800px，再尝试
        const ZOOM = 800;
        const regions = [];
        // 四象限
        const hw = Math.floor(w / 2), hh = Math.floor(h / 2);
        regions.push([0, 0, hw, hh]);           // 左上
        regions.push([hw, 0, w - hw, hh]);       // 右上
        regions.push([0, hh, hw, h - hh]);       // 左下
        regions.push([hw, hh, w - hw, h - hh]);  // 右下
        // 中央 50%
        const cx = Math.floor(w * 0.25), cy = Math.floor(h * 0.25);
        regions.push([cx, cy, Math.floor(w * 0.5), Math.floor(h * 0.5)]);
        // 左右半区（全高）
        regions.push([0, 0, hw, h]);
        regions.push([hw, 0, w - hw, h]);
        // 上下半区（全宽）
        regions.push([0, 0, w, hh]);
        regions.push([0, hh, w, h - hh]);

        for (const [rx, ry, rw, rh] of regions) {
          if (rw < 50 || rh < 50) continue;
          const zoomed = cropAndZoom(canvas, rx, ry, rw, rh, ZOOM);
          const r = tryAllOnCanvas(zoomed);
          if (r) { resolve(r); return; }
        }

        resolve(null);
      } catch (e) { console.error('[decodeQR]', e); resolve(null); }
    };
    img.onerror = () => resolve(null);
    img.src = src;
  });
}

/* ── Cloudflare Worker URL（解析 epandian deviceV2 链接） ── */
const WORKER_URL = 'https://epandian-asset-resolver.brenda-jiang.workers.dev';

/* ── 通过 Cloudflare Worker 解析 epandian.com deviceV2 URL → 资产编号 ── */
async function fetchAssetFromUrl(url) {
  try {
    // epandian deviceV2 格式（含子路径）：取 URL 最后一段 hex 作为 deviceId
    // 例如：/deviceV2/c83b634d7ec9feda 或 /deviceV2/823/c83b634d7ec9feda
    if (url.includes('/deviceV2/')) {
      const parts = url.replace(/\/$/, '').split('/');
      const hexId = parts[parts.length - 1];
      if (/^[0-9a-f]{8,32}$/i.test(hexId)) {
        const resp = await fetch(`${WORKER_URL}?deviceId=${hexId}`);
        if (!resp.ok) return null;
        const data = await resp.json();
        return data.assetCode || null;
      }
    }
    // 其他 epandian URL 格式（/device/ 等）：直接取末段作为资产编号
    const parts = url.replace(/\/$/, '').split('/');
    const last = parts[parts.length - 1];
    if (last && /^[A-Z0-9]+-[A-Z0-9]+-[A-Z0-9]+$/i.test(last)) return last.toUpperCase();
    return null;
  } catch (e) {
    console.warn('[fetchAssetFromUrl]', e.message);
    return null;
  }
}

/* ── 正则提取资产编号 ── */
function extractAssetNumber(rawText) {
  // 合并跨行断开的数字（OCR 换行截断：1-0102-00\n\n779 → 1-0102-00779）
  const text = rawText.replace(/([0-9])[\n\r]+([0-9])/g, '$1$2').replace(/\s+/g, ' ').trim();
  // 同时准备一份「字符纠错文本」：将数字段中常见 OCR 混淆字母替换为数字
  // 仅对连字符之间（数字段）做替换，不影响字母前缀（BIO 中的 O/I）
  const textNorm = text.replace(/-([A-Z0-9]+)(?=-)/g, (_, seg) =>
    '-' + seg.replace(/O/g,'0').replace(/[IL]/g,'1').replace(/S/g,'5').replace(/Z/g,'2').replace(/G/g,'6')
  );

  // 规则 1：字母+数字前缀，后接两组纯数字（BIO403-1044-0070）；末段至少3位防止OCR截断误合
  const r1 = /[A-Z]{1,6}[0-9]{0,6}-[0-9]{2,8}-[0-9]{3,8}/gi;
  // 规则 2：纯数字分段（01-0101-00004），限制首段最多2位避免多余前导数字；末段至少3位
  const r2 = /\b[0-9]{1,2}-[0-9]{2,6}-[0-9]{3,8}\b/g;
  // 规则 3：宽松匹配（任意字母数字，两个连字符）；末段至少3位
  const r3 = /\b[A-Z0-9]{2,12}-[A-Z0-9]{2,8}-[A-Z0-9]{3,8}\b/gi;

  // 用原文匹配 r1（保留 BIO 等字母前缀），用纠错文本匹配 r2/r3
  const candidates = [
    ...(text.match(r1) || []),
    ...(textNorm.match(r2) || []),
    ...(textNorm.match(r3) || []),
  ];
  if (candidates.length === 0) return null;

  // 优先 r1 > r2 > r3；同级取最短匹配
  const r1re = /^[A-Z]{1,6}[0-9]{0,6}-[0-9]{2,8}-[0-9]{3,8}$/i;
  const r2re = /^\d{1,2}-\d{2,6}-\d{3,8}$/;
  const pick = (list) => list.length ? list.sort((a,b) => a.length-b.length)[0] : null;
  let result = (pick(candidates.filter(c => r1re.test(c))) ||
                pick(candidates.filter(c => r2re.test(c))) ||
                pick(candidates)).toUpperCase();

  // 补全首段单数字为两位（1-0101-00004 → 01-0101-00004）
  result = result.replace(/^([0-9])-/, '0$1-');

  // 修正镜像读反（纯数字段：88500-1010-10 → 01-0101-00588）
  if (/^\d+-\d+-\d+$/.test(result)) {
    const parts = result.split('-');
    if (parts[0].length > parts[parts.length - 1].length) {
      const rev = result.split('').reverse().join('');
      if (/^\d{1,2}-\d{2,6}-\d{2,8}$/.test(rev)) result = rev;
    }
  }

  // 修剪纯数字码末段多余位（OCR在末段后多读1位噪点：01-0101-005885 → 01-0101-00588）
  // 观察到的纯数字格式末段固定5位；超过5位时截断
  if (/^\d{1,2}-\d+-\d{6,}$/.test(result)) {
    const parts = result.split('-');
    result = parts[0] + '-' + parts[1] + '-' + parts[2].slice(0, 5);
  }

  return result;
}

/* ── 判断单元格是否有值 ── */
function hasValue(cellVal) {
  if (!cellVal) return false;
  if (typeof cellVal === 'string') return cellVal.trim() !== '';
  if (Array.isArray(cellVal)) {
    if (cellVal.length === 0) return false;
    if (cellVal[0] && (cellVal[0].token || cellVal[0].fileToken)) return true;
    return cellVal.some(seg => seg.text && seg.text.trim() !== '');
  }
  return false;
}

/* ── 获取所有附件临时 URL ── */
async function getAllAttachmentUrls(table, fieldId, recordId, cellVal) {
  if (!hasValue(cellVal)) return [];
  const attachments = Array.isArray(cellVal) ? cellVal : [];
  const tokens = attachments.map(a => a.token || a.fileToken).filter(Boolean);
  if (tokens.length === 0) return [];
  const urls = await table.getCellAttachmentUrls(tokens, fieldId, recordId);
  return urls || [];
}

/* ── 主流程 ── */
async function run() {
  if (state.running) return;
  state.running = true;
  state.stats = { ok: 0, skip: 0, fail: 0 };

  document.getElementById('restart-btn').style.display   = 'none';
  document.getElementById('log-card').style.display      = 'none';
  document.getElementById('log-scroll').innerHTML        = '';
  document.getElementById('tip').style.display           = 'none';
  document.getElementById('progress-wrap').style.display = 'none';
  document.getElementById('stats').style.display         = 'none';
  lockConfig(true);

  try {
    /* 1. 检查环境 */
    if (typeof jsQR !== 'function') {
      setStatus('error', 'jsQR 库未加载——请确认 assets/jsQR.js 已上传到 GitHub Pages');
      return;
    }
    const inIframe = window !== window.top;
    if (window.bitable == null) {
      setStatus('error', inIframe
        ? 'bitable SDK 尚未就绪，请关闭插件后重新打开'
        : '请在飞书多维表格插件面板中打开此页面');
      return;
    }

    /* 2. 连接多维表格（15 秒超时） */
    setStatus('loading', '连接多维表格…');
    const table = await Promise.race([
      bitable.base.getActiveTable(),
      new Promise((_, reject) =>
        setTimeout(() => reject(new Error('连接飞书宿主超时（15 秒），请关闭插件后重新打开')), 15000)
      ),
    ]);

    /* 3. 查找字段 */
    const photoFieldName  = document.getElementById('photo-field').value.trim();
    const resultFieldName = document.getElementById('result-field').value.trim();
    if (!photoFieldName || !resultFieldName) {
      setStatus('error', '请填写图片列和结果列的字段名称');
      return;
    }

    const fieldList = await table.getFieldMetaList();
    const photoField  = fieldList.find(f => f.name === photoFieldName);
    const resultField = fieldList.find(f => f.name === resultFieldName);
    if (!photoField)  { setStatus('error', `未找到字段「${photoFieldName}」，请检查字段名称`);  return; }
    if (!resultField) { setStatus('error', `未找到字段「${resultFieldName}」，请检查字段名称`); return; }

    /* 4. 获取当前视图可见记录 */
    setStatus('loading', '读取记录列表…');
    const view      = await table.getActiveView();
    const recordIds = await view.getVisibleRecordIdList();
    const total     = recordIds.length;
    if (total === 0) { setStatus('warning', '当前视图没有可见记录'); return; }

    /* 5. 开始逐行处理 */
    setStatus('loading', `开始识别，共 ${total} 条记录…`);
    showProgress(0, total);

    for (let i = 0; i < total; i++) {
      const recordId = recordIds[i];
      try {
        const photoVal  = await table.getCellValue(photoField.id, recordId);
        const resultVal = await table.getCellValue(resultField.id, recordId);

        // 两列都有值 → 跳过
        if (hasValue(photoVal) && hasValue(resultVal)) {
          state.stats.skip++;
          addLog('skip', `第 ${i + 1} 行 — 已有识别结果，跳过`);
          showProgress(i + 1, total);
          continue;
        }

        // 无图片 → 跳过
        if (!hasValue(photoVal)) {
          state.stats.skip++;
          addLog('skip', `第 ${i + 1} 行 — 无图片，跳过`);
          showProgress(i + 1, total);
          continue;
        }

        // jsQR 二维码解码（遍历所有附件照片，汇总全部识别结果）
        let recognized = null;
        let debugInfo  = '';
        try {
          const attachUrls = await getAllAttachmentUrls(table, photoField.id, recordId, photoVal);
          if (attachUrls.length === 0) {
            debugInfo = '附件URL获取失败（SDK未返回URL）';
          } else {
            const recognizedList = [];
            const failList = [];
            for (let ai = 0; ai < attachUrls.length; ai++) {
              let blobUrl = null;
              try {
                const resp = await fetch(attachUrls[ai]);
                if (resp.ok) blobUrl = URL.createObjectURL(await resp.blob());
              } catch (_) {}
              const src = blobUrl || attachUrls[ai];

              const qrText = await decodeQR(src);
              let code = null;
              if (qrText) {
                code = extractAssetNumber(qrText)
                  || (/^[A-Z0-9]+-[A-Z0-9]+-[A-Z0-9]+$/i.test(qrText) ? qrText.toUpperCase() : null);
                if (!code && /^https?:\/\//i.test(qrText)) code = await fetchAssetFromUrl(qrText);
              }
              if (code) recognizedList.push(code);
              else failList.push(`第${ai+1}张${qrText ? `(内容无法解析)` : '(未检测到QR)'}`);
              if (blobUrl) URL.revokeObjectURL(blobUrl);
            }
            if (recognizedList.length > 0) {
              recognized = recognizedList.join('\n');
              debugInfo = `识别成功 ${recognizedList.length}/${attachUrls.length} 张`;
            } else {
              debugInfo = failList.join('；');
            }
          }
        } catch (qrErr) {
          debugInfo = `错误: ${qrErr.message}`;
        }

        // 回写
        if (recognized) {
          await table.setCellValue(resultField.id, recordId, [{ type: 'text', text: recognized }]);
          state.stats.ok++;
          addLog('ok', `第 ${i + 1} 行 → ${recognized}`);
        } else {
          state.stats.fail++;
          addLog('fail', `第 ${i + 1} 行 — ${debugInfo}`);
        }
      } catch (rowErr) {
        console.error('处理记录出错', recordId, rowErr);
        state.stats.fail++;
        addLog('fail', `第 ${i + 1} 行 — 处理出错：${rowErr.message || rowErr}`);
      }

      showProgress(i + 1, total);
    }

    /* 7. 完成 */
    showProgress(total, total);
    const msg = `全部处理完毕 — 识别 ${state.stats.ok} 条，跳过 ${state.stats.skip} 条，失败 ${state.stats.fail} 条`;
    setStatus(state.stats.fail > 0 ? 'warning' : 'success', msg);
    document.getElementById('restart-btn').style.display = 'block';
    document.getElementById('tip').style.display         = 'block';

  } catch (err) {
    console.error('主流程出错', err);
    setStatus('error', `运行出错：${err.message || err}`);
  } finally {
    state.running = false;
    lockConfig(false);
    // 无论成功、失败还是提前退出，都确保按钮可见（让用户可以重试）
    const btn = document.getElementById('restart-btn');
    if (btn.style.display === 'none') btn.style.display = 'block';
  }
}

function startWhenReady() {
  if (window.bitable != null) {
    run();
  } else {
    window.addEventListener('bitable-ready', run, { once: true });
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', startWhenReady);
} else {
  startWhenReady();
}
</script>
</body>
</html>
